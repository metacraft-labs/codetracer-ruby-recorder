name: Publish Gems

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (overrides tag for manual runs)'
        required: true
        default: '0.1.0'
      dry_run:
        description: 'Build the gem but skip the upload'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3
      - name: Setup just
        uses: extractions/setup-just@v1
      - name: Publish gems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: ruby scripts/publish_gems.rb
