name: CI

on:
  push:
    branches: [main, dev, stable]
  pull_request:

jobs:
  # Build + test through the repo's declared dev env on every supported OS:
  # the nix dev shell on Linux/macOS and the env.ps1 DIY env on Windows.
  # setup-dev-env materialises the chosen flavor and clones the siblings
  # listed in .github/sibling-repos at the workspace-lock-pinned revisions;
  # every build/test command runs through dev-exec so no toolchain is
  # installed open-coded.
  test:
    name: Build and test (${{ matrix.label }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            runs-on: [self-hosted, nixos]
            flavor: nix
          - label: macos
            runs-on: macos-latest
            flavor: nix
          - label: windows
            runs-on: windows-latest
            flavor: windows-diy
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Setup dev env
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: ${{ matrix.flavor }}
          gh-token: ${{ steps.app-token.outputs.token }}
          substituters: ${{ vars.SUBSTITUTERS }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          attic-cache: ${{ vars.ATTIC_CACHE }}
          attic-endpoint: ${{ vars.ATTIC_ENDPOINT }}

      - name: Install Ruby dependencies
        run: dev-exec bundle install

      - name: Build ct-print binary
        # `test/test_tracer.rb` shells out to
        # `../codetracer-trace-format-nim/ct-print` to decode the
        # CTFS bundle the native recorder writes back into the
        # legacy JSON shape used by the pure-ruby reference oracle.
        # Build it via the dev shell so the nim+nimble+zstd
        # toolchain comes from flake.nix.
        run: |
          dev-exec bash -c '
            set -euo pipefail
            cd "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
            nimble install -y stew results
            nim c -d:release -p:src -o:ct-print src/codetracer_ct_print.nim
          '

      - name: Build extension
        run: dev-exec just build-extension

      - name: Run tests
        run: dev-exec just test

  benchmark:
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Setup dev env
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}
          substituters: ${{ vars.SUBSTITUTERS }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          attic-cache: ${{ vars.ATTIC_CACHE }}
          attic-endpoint: ${{ vars.ATTIC_ENDPOINT }}

      - name: Build ct-print binary
        run: |
          dev-exec bash -c '
            set -euo pipefail
            cd "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
            nimble install -y stew results
            nim c -d:release -p:src -o:ct-print src/codetracer_ct_print.nim
          '

      - name: Install Ruby dependencies
        run: dev-exec bundle install

      - name: Build extension
        run: dev-exec just build-extension

      - name: Run benchmarks and generate report
        run: dev-exec just bench heavy_work reports/benchmark_report.svg

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'reports/benchmark_report.svg';
            let content = fs.readFileSync(path, 'utf8');
            content = '<details>\n<summary>Benchmark Report</summary>\n\n' +
                      content + '\n</details>';
            const issue_number = context.payload.pull_request.number;
            const header = '<!-- benchmark-report -->\n';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number
            });
            const existing = comments.data.find(c => c.body.startsWith(header));
            const body = header + content;
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number,
                body
              });
            }

  nix-build:
    name: Verify nix flake packages build
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Setup dev env
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}
          substituters: ${{ vars.SUBSTITUTERS }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          attic-cache: ${{ vars.ATTIC_CACHE }}
          attic-endpoint: ${{ vars.ATTIC_ENDPOINT }}

      - name: Build native recorder package
        run: nix build .#codetracer-ruby-recorder

      - name: Build pure Ruby recorder package
        run: nix build .#codetracer-pure-ruby-recorder
